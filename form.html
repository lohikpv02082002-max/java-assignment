<!DOCTYPE html>
<html>
<head>
  <title>All Form Elements</title>
  <style>
     body {
      background-image: url('https://media.istockphoto.com/id/1186369895/photo/woman-shoots-cloudy-sunset-view-in-the-mountains-through-a-smartphone.webp?a=1&b=1&s=612x612&w=0&k=20&c=EJye_FTW9AtbfWtp3LlV-7L80d8XxA07DE3rG2zlVEg=');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }
  </style>
</head>
<body>

<form action="submit.php" method="post">

  <!-- Fieldset 1 -->
  <fieldset>
    <legend>Personal Information</legend>

    <label>Name:</label>
    <input type="text" name="name" placeholder="Enter name">
    <br><br>

    <label>Password:</label>
    <input type="password" name="password">
    <br><br>

    <label>Email:</label>
    <input type="email" name="email">
    <br><br>

    <label>Age:</label>
    <input type="number" name="age" min="1" max="100">
    <br><br>
     <label>Skills:</label><br>
    <input type="checkbox" name="skills[]" value="html"> HTML<br>
    <input type="checkbox" name="skills[]" value="css"> CSS<br>
    <input type="checkbox" name="skills[]" value="js"> JavaScript
    <br><br>
    <label>Gender:</label>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
    <br><br>

  </fieldset>

  <br>

  <!-- Fieldset 2 -->
  <fieldset>
    <legend>Additional Details</legend>

    <label>Country:</label>
    <select name="country">
      <option>Select Country</option>
      <option>India</option>
      <option>USA</option>
      <option>UK</option>
    </select>
    <br><br>

    <label>Message:</label><br>
    <textarea name="message" rows="4" cols="30"></textarea>
    <br><br>

    <label>Upload File:</label>
    <input type="file" name="file">
    <br><br>

    <label>Favorite Color:</label>
    <input type="color" name="color">
    <br><br>

    <label>Date of Birth:</label>
    <input type="date" name="dob">
    <br><br>

    <label>Time:</label>
    <input type="time" name="time">
    <br><br>

    <label>Experience Level:</label>
    <input type="range" name="experience" min="0" max="10">
    <br><br>

    <!-- Hidden input -->
    <input type="hidden" name="user_id" value="101">

  </fieldset>

  <br>

  <!-- Buttons -->
  <button type="submit">Submit</button>
  <button type="reset">Reset</button>

</form>
<!DOCTYPE html>
<html>
<head>
  <title>Complex Table</title>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid black;
      padding: 8px;
      text-align: center;
    }
    thead {
      background-color: #f2f2f2;
    }
    tfoot {
      background-color: #e6e6e6;
      font-weight: bold;
    }
  </style>
</head>
<body>

<table>
  <caption><b>Student Performance Report</b></caption>

  <!-- Table Head -->
  <thead>
    <tr>
      <th rowspan="2">Roll No</th>
      <th rowspan="2">Name</th>
      <th colspan="3">Marks</th>
      <th rowspan="2">Total</th>
      <th rowspan="2">Grade</th>
    </tr>
    <tr>
      <th>Math</th>
      <th>Science</th>
      <th>English</th>
    </tr>
  </thead>

  <!-- Table Body -->
  <tbody>
    <tr>
      <td>101</td>
      <td>Amit</td>
      <td>85</td>
      <td>78</td>
      <td>90</td>
      <td>253</td>
      <td>A</td>
    </tr>

    <tr>
      <td>102</td>
      <td>Neha</td>
      <td>88</td>
      <td>92</td>
      <td>81</td>
      <td>261</td>
      <td>A+</td>
    </tr>

    <tr>
      <td>103</td>
      <td>Rahul</td>
      <td colspan="3">Absent</td>
      <td>0</td>
      <td>F</td>
    </tr>
  </tbody>

  <!-- Table Footer -->
  <tfoot>
    <tr>
      <td colspan="5">Class Average</td>
      <td>171</td>
      <td>-</td>
    </tr>
  </tfoot>

</table>

</body>
</html>
