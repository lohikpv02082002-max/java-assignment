    <!DOCTYPE html>
<html>
<head>
    <title>Grid Layout</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, green, black);
            color: white;
            position: sticky;
            top: 0;
            margin: 0;
            padding: 15px 0;
        }

        .man {
            width: 200px;
            background-color: green;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding-top: 20px;
            color: white;
        }

        .kpv {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
        }

        .lohi {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-auto-rows: 100px;                  /* rows are 100px height */
            gap: 20px;                              
            justify-content: center;                 
            align-content: start;
            padding: 20px;
            background: linear-gradient(65deg, green, black);
            border: blue solid 5px;
            border-radius: 10px;
        }

        .lohi > div {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: red;
            color: white;
            font-size: 24px;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Welcome</h1>
    <div class="kpv">
        <div class="man">
            <h3>Home</h3>
            <h3>About Us</h3>
            <h3>Help</h3>
            <h3>Admin</h3>
        </div>

        <div class="lohi">
            <div id="lohi1">1</div>
            <div id="lohi2">2</div>
            <div id="lohi3">3</div>
            <div id="lohi4">4</div>
            <div id="lohi5">5</div>
            <div id="lohi6">6</div>
        </div>
    </div>
</body>
</html>
