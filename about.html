<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      /* Background */
      background: linear-gradient(
          rgba(164, 25, 25, 0.55),
          rgba(0, 0, 0, 0.55)
        ),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee")
          no-repeat center / cover;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      border-radius: 12px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
    }

    .login-card h2 {
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .login-card input {
      width: 100%;
      padding: 12px;
      margin-bottom: 1rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      background: #4f46e5;
      color: #fff;
      cursor: pointer;
    }

    .login-card button:hover {
      background: #4338ca;
    }

    .login-card .footer {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.9rem;
    }

    .login-card .footer a {
      color: #4f46e5;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>Welcome Back</h2>
    <form>
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <div class="footer">
      <p>Don’t have an account? <a href="#">Sign up</a></p>
    </div>
  </div>
  <script>
    let num=prompt("po num")
    


     if(num/2==0){
      
       console.log("odd");
      }
      else{
       console.log("en num");
     }
     let x=prompt("ene ")
     let y=x.split("").reverse().join("");
     console.log(y);
     if(x==y){
      console.log("palind");
     }
     else{
      console.log("nop ");
     } 
     
  </script>
</body>
</html>
