<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Index Demo</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

/* Box 1 */
.box1 {
  position: relative;  /* Must be positioned */
  width: 200px;
  height: 200px;
  background: red;
  z-index: 1;          /* Behind box2 and box3 */
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  margin-bottom: 50px;
}

/* Box 2 */
.box2 {
  position: relative;
  width: 200px;
  height: 200px;
  background: blue;
  z-index: 2;          /* On top of box1 */
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  margin-top: -150px;  /* Overlapping box1 */
  margin-left: 50px;
}

/* Box 3 */
.box3 {
  position: relative;
  width: 200px;
  height: 200px;
  background: green;
  z-index: 3;          /* On top of both box1 and box2 */
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  margin-top: -150px;  /* Overlapping previous boxes */
  margin-left: 100px;
}
</style>
</head>
<body>

<h1>Z-Index Demo</h1>

<div class="box1">Box 1 (z-index:1)</div>
<div class="box2">Box 2 (z-index:2)</div>
<div class="box3">Box 3 (z-index:3)</div>

<p>
Notice how the boxes overlap: green (box3) is on top, blue (box2) is in the middle, and red (box1) is at the bottom.
</p>
